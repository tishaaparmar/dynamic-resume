<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="apricotGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f9a882" />
      <stop offset="100%" stop-color="#fccba1" />
    </linearGradient>
  </defs>
  <!-- Rounded page shape -->
  <rect x="4" y="2" width="24" height="28" rx="4.5" fill="url(#apricotGrad)" />
  <!-- Folded corner effect -->
  <path d="M20,2 L28,10 L20,10 Z" fill="#ffedd5" opacity="0.9" />
  <!-- Fold outline -->
  <path d="M20,2 L20,10 L28,10" fill="none" stroke="#fff" stroke-width="1.2" stroke-linejoin="round" />
  <!-- Sheet lines -->
  <line x1="8" y1="14" x2="24" y2="14" stroke="#fff" stroke-width="2.5" stroke-linecap="round" />
  <line x1="8" y1="20" x2="24" y2="20" stroke="#fff" stroke-width="2.5" stroke-linecap="round" />
  <line x1="8" y1="26" x2="18" y2="26" stroke="#fff" stroke-width="2.5" stroke-linecap="round" />
</svg>
